openapi: 3.1.0
info:
  title: agent-cold-email API
  version: "0.1.0"
  description: >
    Agent-native cold-email infrastructure. ~17 curated intents behind one
    bearer token per tenant (a subset — the /dashboard/* session + views
    endpoints — also accept an httpOnly session cookie minted by
    POST /dashboard/session, for the optional human dashboard SPA; see
    SPEC.md §19). Content generation is the caller's job; this API owns
    infrastructure provisioning, sequencing, isolation, and compliance
    guardrails. Early access — this spec documents the intended contract;
    see the repository ROADMAP.md for what is live vs. in build. No
    deliverability or inbox-placement guarantees are made by this API.
  contact:
    name: EpiphanyMade
    email: support@epiphanymade.com
  license:
    name: MIT
servers:
  - url: https://agent-cold-email-api.yaakovscher.workers.dev
    description: Placeholder — substituted with the deployed API host post-deploy.

security:
  - bearerAuth: []

tags:
  - name: bootstrap
  - name: infrastructure
  - name: campaigns
  - name: inbox
  - name: account
  - name: dashboard
  - name: compliance

paths:
  /signup:
    post:
      operationId: signup
      tags: [bootstrap]
      summary: Create a tenant and mint a bearer token.
      description: >
        Unauthenticated bootstrap call. Always mints a demo-plan tenant in
        the current build (no live paid/Stripe checkout path yet) — a demo
        tenant is structurally incapable of reaching a real vendor adapter.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignupInput'
      responses:
        '201':
          description: Tenant created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  tenantId: { type: string, example: "ten_a1b2c3" }
                  token: { type: string, description: "Bearer token — store securely, shown once." }
                required: [tenantId, token]
        '400':
          $ref: '#/components/responses/ValidationError'

  /setup-infrastructure:
    post:
      operationId: setup_infrastructure
      tags: [infrastructure]
      summary: Provision branded lookalike domains and mailboxes; start warmup.
      description: >
        Asynchronous: returns 202 immediately. Poll GET /infrastructure-status
        for progress. In demo/free plans this runs entirely against a
        fault-injecting sandbox — no real domain purchase or mailbox
        provisioning occurs.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetupInfrastructureInput'
      responses:
        '202':
          description: Provisioning started.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /infrastructure-status:
    get:
      operationId: infrastructure_status
      tags: [infrastructure]
      summary: Provisioning + warmup progress, per-mailbox health, send-readiness.
      responses:
        '200':
          description: Current infrastructure status.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '401':
          $ref: '#/components/responses/Unauthorized'

  /campaigns:
    post:
      operationId: launch_campaign
      tags: [campaigns]
      summary: Create and activate a campaign against a lead list.
      description: >
        The caller supplies the offer and sequence content — this API does
        not generate outreach copy.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LaunchCampaignInput'
      responses:
        '201':
          description: Campaign created.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
    get:
      operationId: list_campaigns
      tags: [campaigns]
      summary: List every campaign for the tenant with id, name, status, and event counts.
      description: >
        No N+1: one query for the campaign rows, one GROUP BY for every
        campaign's event counts. A campaign with zero events still reports
        zero-filled counts (never missing keys).
      responses:
        '200':
          description: Campaign list.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/CampaignListItem' }
        '401':
          $ref: '#/components/responses/Unauthorized'

  /campaigns/{id}/results:
    get:
      operationId: campaign_results
      tags: [campaigns]
      summary: Sends, replies, bounces, and complaints for one campaign.
      parameters:
        - $ref: '#/components/parameters/CampaignId'
      responses:
        '200':
          description: Campaign results.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /campaigns/{id}/pause:
    post:
      operationId: pause
      tags: [campaigns]
      summary: Pause one campaign.
      parameters:
        - $ref: '#/components/parameters/CampaignId'
      responses:
        '200':
          description: Paused.
          content:
            application/json:
              schema:
                type: object
                properties: { paused: { type: boolean } }
        '401':
          $ref: '#/components/responses/Unauthorized'

  /campaigns/pause-all:
    post:
      operationId: pause_all
      tags: [campaigns]
      summary: Pause every campaign for the authenticated tenant.
      responses:
        '200':
          description: All paused.
          content:
            application/json:
              schema:
                type: object
                properties: { pausedAll: { type: boolean } }
        '401':
          $ref: '#/components/responses/Unauthorized'

  /metrics:
    get:
      operationId: metrics
      tags: [account]
      summary: Account-wide deliverability + warmup health.
      responses:
        '200':
          description: Metrics snapshot.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '401':
          $ref: '#/components/responses/Unauthorized'

  /inbox:
    get:
      operationId: inbox
      tags: [inbox]
      summary: Unified reply inbox across all mailboxes for the tenant.
      description: >
        v2: cursor-paginated, filterable. A bare GET /inbox (no query params)
        preserves the exact pre-v2 shape — every thread, bounces/OOO
        included, page 1 of 50.
      parameters:
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
        - name: cursor
          in: query
          schema: { type: string, minLength: 1, maxLength: 500 }
        - name: mailbox
          in: query
          schema: { type: string, minLength: 1, maxLength: 320 }
        - name: campaign
          in: query
          schema: { type: string, minLength: 1, maxLength: 200 }
        - name: label
          in: query
          schema: { type: string, minLength: 1, maxLength: 100 }
        - name: read
          in: query
          schema: { type: boolean }
        - name: include_nonreply
          in: query
          description: >
            Include bounces/OOO/other non-reply threads. Default true
            (matches the pre-v2 GET /inbox shape); the dashboard UI's
            default view sets this false.
          schema: { type: boolean, default: true }
        - name: archived
          in: query
          schema: { type: string, enum: [exclude, include, only], default: exclude }
      responses:
        '200':
          description: Inbox listing.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '401':
          $ref: '#/components/responses/Unauthorized'

  /threads/{id}:
    get:
      operationId: thread
      tags: [inbox]
      summary: Full message history for one thread.
      parameters:
        - $ref: '#/components/parameters/ThreadId'
      responses:
        '200':
          description: Thread detail.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /threads/{id}/reply:
    post:
      operationId: reply
      tags: [inbox]
      summary: Send a reply on an existing thread.
      parameters:
        - $ref: '#/components/parameters/ThreadId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReplyInput'
      responses:
        '201':
          description: Reply sent.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /threads/{id}/mark:
    post:
      operationId: mark
      tags: [inbox]
      summary: Mark a thread read, unread, or archived.
      parameters:
        - $ref: '#/components/parameters/ThreadId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MarkInput'
      responses:
        '200':
          description: Marked.
          content:
            application/json:
              schema:
                type: object
                properties: { marked: { type: boolean } }
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /threads/{id}/label:
    post:
      operationId: label_thread
      tags: [inbox]
      summary: Set (or, with label null, clear) a triage label on an inbox thread.
      parameters:
        - $ref: '#/components/parameters/ThreadId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ThreadLabelInput'
      responses:
        '200':
          description: Label set/cleared.
          content:
            application/json:
              schema:
                type: object
                properties:
                  threadId: { type: string }
                  label: { type: string, nullable: true }
                  source:
                    type: string
                    nullable: true
                    enum: [dashboard, mcp, api, system]
                required: [threadId, label, source]
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /activity:
    get:
      operationId: activity
      tags: [inbox]
      summary: Unified, chronological feed of campaign events + deliverability control-loop actions.
      description: >
        Merges the `events` table (sends/replies/bounces/complaints) with
        `deliverability_actions` (pause/throttle/rotate/replace-domain) into
        one cursor-paginated feed, one query.
      parameters:
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
        - name: cursor
          in: query
          schema: { type: string, minLength: 1, maxLength: 500 }
        - name: kind
          in: query
          description: Omit for every kind (backward-compatible default).
          schema: { type: string, enum: [event, deliverability] }
      responses:
        '200':
          description: Activity feed page.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActivityPage'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /account:
    get:
      operationId: account
      tags: [account]
      summary: Usage, billing state, and quota for the tenant.
      responses:
        '200':
          description: Account snapshot.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '401':
          $ref: '#/components/responses/Unauthorized'

  /dashboard/session:
    post:
      operationId: dashboard_login
      tags: [dashboard]
      summary: Exchange a tenant bearer token for an httpOnly dashboard session cookie.
      description: >
        Unauthenticated (there is no Authorization header at this point in
        the flow) — the pasted tenant bearer token travels in the JSON body
        instead and is verified here via the same resolver `requireAuth`
        uses. On success, sets an httpOnly/Secure/SameSite=Strict session
        cookie; the SPA never sees the bearer token or the session id in
        JS-readable storage.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DashboardSessionInput'
      responses:
        '200':
          description: Session cookie set.
          content:
            application/json:
              schema:
                type: object
                properties:
                  tenantId: { type: string }
                required: [tenantId]
        '401':
          $ref: '#/components/responses/Unauthorized'

  /dashboard/logout:
    post:
      operationId: dashboard_logout
      tags: [dashboard]
      summary: Revoke the current dashboard session cookie.
      security:
        - bearerAuth: []
        - dashboardSessionCookie: []
      responses:
        '200':
          description: Logged out.
          content:
            application/json:
              schema:
                type: object
                properties: { loggedOut: { type: boolean } }
        '401':
          $ref: '#/components/responses/Unauthorized'

  /dashboard/views:
    get:
      operationId: get_dashboard
      tags: [dashboard]
      summary: List every saved dashboard view (summary — id, name, isDefault, rev, editedBy).
      security:
        - bearerAuth: []
        - dashboardSessionCookie: []
      responses:
        '200':
          description: Saved-view summaries; lazy-seeds the `default` view for a brand-new tenant.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/DashboardViewSummary' }
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: configure_dashboard_create
      tags: [dashboard]
      summary: Create a dashboard saved view.
      security:
        - bearerAuth: []
        - dashboardSessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DashboardViewCreateInput'
      responses:
        '201':
          description: View created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardViewDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          description: Invalid/unknown widget type or props (syntactically valid JSON, semantically invalid).
          content:
            application/json:
              schema:
                type: object
                properties: { error: { type: string }, issues: { type: array, items: { type: object } } }

  /dashboard/views/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    get:
      operationId: get_dashboard_view
      tags: [dashboard]
      summary: Fetch one saved view's full layout + rev.
      security:
        - bearerAuth: []
        - dashboardSessionCookie: []
      responses:
        '200':
          description: View detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardViewDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      operationId: configure_dashboard_update
      tags: [dashboard]
      summary: Update a saved view's layout (rev-CAS) and/or rename it.
      description: >
        `rev` must match the view's current rev; a stale rev returns 409
        with a structured conflict (currentRev + currentLayout) so the
        caller can rebase and retry. Omitting `name` leaves it unchanged.
      security:
        - bearerAuth: []
        - dashboardSessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DashboardViewUpdateInput'
      responses:
        '200':
          description: View updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardViewDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Stale rev — structured conflict to rebase onto.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error: { type: string }
                  currentRev: { type: integer }
                  currentLayout: { $ref: '#/components/schemas/DashboardLayout' }
                required: [error, currentRev, currentLayout]
        '422':
          description: Invalid/unknown widget type or props.
          content:
            application/json:
              schema:
                type: object
                properties: { error: { type: string }, issues: { type: array, items: { type: object } } }
    delete:
      operationId: configure_dashboard_delete
      tags: [dashboard]
      summary: Delete a saved view (cannot delete the default view or the last remaining view).
      security:
        - bearerAuth: []
        - dashboardSessionCookie: []
      responses:
        '200':
          description: Deleted.
          content:
            application/json:
              schema:
                type: object
                properties: { deleted: { type: boolean } }
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /dashboard/views/{id}/default:
    post:
      operationId: configure_dashboard_promote
      tags: [dashboard]
      summary: Promote a saved view to be the tenant's default.
      security:
        - bearerAuth: []
        - dashboardSessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Every saved-view summary, with the promoted view's isDefault now true.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/DashboardViewSummary' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /unsubscribe:
    get:
      operationId: unsubscribe_confirm_page
      tags: [compliance]
      summary: Render a human confirm page for the in-body one-click unsubscribe link.
      description: >
        UNAUTHENTICATED — the signed `tenant`/`email`/`sig` triplet in the
        query string (minted server-side into every sequence email's
        List-Unsubscribe header and in-body opt-out link) is the credential;
        there is no bearer token on this route. GET alone never suppresses
        anything — it renders an HTML confirm page whose own form POSTs back
        to this same URL. Intended for a human clicking the link inside the
        email body, in a browser; a mail client's own automatic RFC 8058
        one-click action POSTs directly (see below) and never hits this GET.
      security: []
      parameters:
        - $ref: '#/components/parameters/UnsubscribeTenant'
        - $ref: '#/components/parameters/UnsubscribeEmail'
        - $ref: '#/components/parameters/UnsubscribeSig'
      responses:
        '200':
          description: Confirm page (not yet unsubscribed).
          content:
            text/html:
              schema: { type: string }
        '400':
          description: Missing/invalid query params or an invalid/tampered signature.
          content:
            text/html:
              schema: { type: string }
    post:
      operationId: unsubscribe_confirm
      tags: [compliance]
      summary: Perform the RFC 8058 one-click unsubscribe (or confirm from the GET page).
      description: >
        UNAUTHENTICATED, same credential as the GET above. This is the exact
        URL a compliant mail client POSTs to automatically for its own native
        "Unsubscribe" action (`List-Unsubscribe-Post: List-Unsubscribe=One-Click`)
        — no human interaction on this page in that flow — and is also what
        the GET confirm page's own form submits to when a human clicks
        through the in-body link instead. Suppresses the address tenant-wide
        immediately (visible to the very next scheduling tick, not a CAN-SPAM-
        style grace window) and cancels every pending scheduled send for every
        lead sharing that email across every campaign. Idempotent: a repeat
        call with the same valid token always 200s.
      security: []
      parameters:
        - $ref: '#/components/parameters/UnsubscribeTenant'
        - $ref: '#/components/parameters/UnsubscribeEmail'
        - $ref: '#/components/parameters/UnsubscribeSig'
      responses:
        '200':
          description: Unsubscribed (or already was — idempotent).
          content:
            text/html:
              schema: { type: string }
        '400':
          description: Missing/invalid query params or an invalid/tampered signature — no suppression applied.
          content:
            text/html:
              schema: { type: string }
        '413':
          description: Request body too large.

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Token returned by POST /signup. One token = one isolated tenant.
    dashboardSessionCookie:
      type: apiKey
      in: cookie
      name: cs_dashboard_session
      description: >
        httpOnly session cookie minted by POST /dashboard/session (30-day
        TTL). Alternative to bearerAuth for /dashboard/* routes only, used by
        the optional human dashboard SPA. A cookie-authed mutating request
        (any method other than GET/HEAD) must also send the
        `X-Coldstart-Client: dashboard` header (global CSRF guard,
        SPEC.md §19.1) — bearer-authed requests are exempt.

  parameters:
    CampaignId:
      name: id
      in: path
      required: true
      description: >
        The MCP tool `campaign_results` takes this same identifier as a
        `campaignId` argument (there is no URL path in MCP tool calls).
      schema: { type: string }
    ThreadId:
      name: id
      in: path
      required: true
      schema: { type: string }
    UnsubscribeTenant:
      name: tenant
      in: query
      required: true
      description: The tenant id this signed opt-out link belongs to.
      schema: { type: string, minLength: 1, maxLength: 200 }
    UnsubscribeEmail:
      name: email
      in: query
      required: true
      description: The recipient address this signed opt-out link covers.
      schema: { type: string, minLength: 1, maxLength: 320, format: email }
    UnsubscribeSig:
      name: sig
      in: query
      required: true
      description: >
        HMAC-SHA256 over `tenant:email`, keyed off a server secret. There is
        no per-send row backing this — the signature itself is the entire
        credential, and it never expires (an opt-out doesn't need to).
      schema: { type: string, minLength: 1, maxLength: 128 }
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      description: >
        Optional. Resend the SAME key on retry to avoid duplicate campaigns:
        the first call runs, a replay with the same key returns the recorded
        result without re-executing. Note the mechanism differs by
        transport — REST takes this as the `Idempotency-Key` header (this
        parameter); the MCP `launch_campaign` tool takes the equivalent
        value as an `idempotencyKey` argument field instead, since MCP
        tool calls have no separate header channel.
      schema: { type: string, minLength: 1, maxLength: 200 }

  responses:
    ValidationError:
      description: Request body failed schema validation.
      content:
        application/json:
          schema:
            type: object
            properties: { error: { type: string } }
    Unauthorized:
      description: Missing, invalid, or inactive bearer token.
      content:
        application/json:
          schema:
            type: object
            properties: { error: { type: string } }
    NotFound:
      description: Resource not found, or not owned by the authenticated tenant.
      content:
        application/json:
          schema:
            type: object
            properties: { error: { type: string } }

  schemas:
    SignupInput:
      type: object
      required: [brand, contactEmail]
      properties:
        brand: { type: string, minLength: 1, maxLength: 200 }
        contactEmail: { type: string, format: email }

    SetupInfrastructureInput:
      type: object
      required: [brand, primaryDomain, domains, inboxesEach, persona, physicalAddress, senderIdentity]
      properties:
        brand: { type: string, minLength: 1, maxLength: 200 }
        primaryDomain: { type: string, minLength: 3, maxLength: 253, example: "acme.com" }
        domains: { type: integer, minimum: 1, maximum: 20, description: "Number of lookalike domains to provision." }
        inboxesEach: { type: integer, minimum: 1, maximum: 10, description: "Mailboxes to provision per domain." }
        persona: { type: string, minLength: 1, maxLength: 200 }
        physicalAddress:
          type: string
          minLength: 1
          maxLength: 500
          description: CAN-SPAM-required physical postal address, injected into every message footer.
        senderIdentity:
          type: string
          minLength: 1
          maxLength: 200
          description: Legal sender identity captured at setup, injected into every message footer.

    SequenceStepInput:
      type: object
      required: [step, subject, body, delayDays]
      properties:
        step: { type: integer, minimum: 1 }
        subject: { type: string, minLength: 1, maxLength: 300 }
        body: { type: string, minLength: 1, maxLength: 20000 }
        delayDays: { type: integer, minimum: 0, maximum: 60 }

    LeadInput:
      type: object
      required: [email, firstName]
      properties:
        email: { type: string, format: email }
        firstName: { type: string, minLength: 1, maxLength: 200 }
        company: { type: string, maxLength: 200, default: "" }

    LaunchCampaignInput:
      type: object
      required: [name, offer, leads, sequence]
      properties:
        name: { type: string, minLength: 1, maxLength: 200 }
        offer: { type: string, minLength: 1, maxLength: 2000 }
        leads:
          type: array
          minItems: 1
          maxItems: 5000
          items: { $ref: '#/components/schemas/LeadInput' }
        sequence:
          type: array
          minItems: 1
          maxItems: 10
          items: { $ref: '#/components/schemas/SequenceStepInput' }
        timezone: { type: string, default: "UTC" }
        sendWindow:
          type: object
          properties:
            startHour: { type: integer, minimum: 0, maximum: 23 }
            endHour: { type: integer, minimum: 0, maximum: 23 }
          default: { startHour: 0, endHour: 23 }
        stopOnReply: { type: boolean, default: true }

    ReplyInput:
      type: object
      required: [body]
      properties:
        body: { type: string, minLength: 1, maxLength: 20000 }

    MarkInput:
      type: object
      required: [status]
      properties:
        status: { type: string, enum: [read, unread, archived] }

    ThreadLabelInput:
      type: object
      properties:
        label:
          type: string
          minLength: 1
          maxLength: 100
          nullable: true
          default: null
          description: Free-form (a UI-recommended taxonomy, not a server-enforced enum). null clears the label.

    EventCounts:
      type: object
      properties:
        sent: { type: integer }
        reply: { type: integer }
        bounce: { type: integer, description: "HARD (permanent 5.x.x) bounces." }
        complaint: { type: integer }
        unsubscribe: { type: integer }
        failed: { type: integer }
        soft_bounce: { type: integer, description: "SOFT (transient 4.x.x) bounces — tallied, not a permanent suppression." }
      required: [sent, reply, bounce, complaint, unsubscribe, failed, soft_bounce]

    CampaignListItem:
      type: object
      required: [campaignId, name, status, counts]
      properties:
        campaignId: { type: string }
        name: { type: string }
        status: { type: string }
        counts: { $ref: '#/components/schemas/EventCounts' }

    ActivityItem:
      type: object
      required: [id, kind, label, ts, target, detail]
      properties:
        id: { type: string }
        kind: { type: string, enum: [event, deliverability] }
        label: { type: string }
        ts: { type: integer }
        target: { type: string, nullable: true }
        detail: { type: object, additionalProperties: true }

    ActivityPage:
      type: object
      required: [items, nextCursor]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/ActivityItem' }
        nextCursor: { type: string, nullable: true }

    DashboardSessionInput:
      type: object
      required: [token]
      properties:
        token: { type: string, minLength: 1, maxLength: 500, description: "The tenant bearer token from POST /signup." }

    # Widget layout (SPEC.md §19.3) — the widget registry's per-type `props`
    # are validated server-side against 8 discriminated schemas
    # (packages/shared/src/dashboard.ts); documented here at the outer-shape
    # level only (type/gridPos/visible + a generic props object) to avoid
    # duplicating that full union into this spec.
    DashboardLayout:
      type: object
      required: [schemaVersion, widgets]
      properties:
        schemaVersion: { type: integer, enum: [1] }
        widgets:
          type: array
          maxItems: 50
          items:
            type: object
            required: [id, type, gridPos, visible, props]
            properties:
              id: { type: string, minLength: 1, maxLength: 100 }
              type:
                type: string
                enum: [kpi_row, mailbox_health, campaign_performance, activity_feed, inbox_preview, agent_log, agent_note, quota_usage]
              gridPos:
                type: object
                required: [x, y, w, h]
                properties:
                  x: { type: integer, minimum: 0, maximum: 11 }
                  y: { type: integer, minimum: 0, maximum: 1000 }
                  w: { type: integer, minimum: 1, maximum: 12 }
                  h: { type: integer, minimum: 1, maximum: 20 }
              visible: { type: boolean, default: true }
              props: { type: object, additionalProperties: true }

    DashboardViewSummary:
      type: object
      required: [id, name, isDefault, rev, editedBy, editedByNote, updatedAt]
      properties:
        id: { type: string }
        name: { type: string }
        isDefault: { type: boolean }
        rev: { type: integer }
        editedBy: { type: string, enum: [dashboard, mcp, api, system] }
        editedByNote: { type: string, nullable: true }
        updatedAt: { type: string }

    DashboardViewDetail:
      allOf:
        - $ref: '#/components/schemas/DashboardViewSummary'
        - type: object
          required: [layout, createdAt]
          properties:
            layout: { $ref: '#/components/schemas/DashboardLayout' }
            createdAt: { type: string }

    DashboardViewCreateInput:
      type: object
      required: [name, layout]
      properties:
        name: { type: string, minLength: 1, maxLength: 200 }
        layout: { $ref: '#/components/schemas/DashboardLayout' }
        note: { type: string, maxLength: 2000 }

    DashboardViewUpdateInput:
      type: object
      required: [rev, layout]
      properties:
        rev: { type: integer, minimum: 1, description: "Must match the view's current rev (rev-CAS)." }
        layout: { $ref: '#/components/schemas/DashboardLayout' }
        name: { type: string, minLength: 1, maxLength: 200, description: "Optional rename; omit to leave unchanged." }
        note: { type: string, maxLength: 2000 }
