name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: install, typecheck, test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install (workspaces)
        run: npm ci

      - name: Typecheck (all workspaces)
        run: npm run typecheck

      - name: Test (all workspaces)
        run: npm test

      - name: Build (all workspaces)
        run: npm run build

      # SPEC.md §19.1 — dangerouslySetInnerHTML is banned outside the
      # sanctioned agent_note sanitization sink (apps/dashboard/src/widgets/
      # AgentNote.tsx); this guard fails the build if any other file uses it.
      - name: Dashboard content-safety guard (dangerouslySetInnerHTML sink)
        run: npm run check:dangerous-html --workspace apps/dashboard
