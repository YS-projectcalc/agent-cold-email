name = "agent-cold-email-api"
main = "src/index.ts"
compatibility_date = "2026-07-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "coldstart-platform-db"
database_id = "119be39d-05c3-4608-b628-b2cc7bddfac1"
migrations_dir = "migrations"

[[durable_objects.bindings]]
name = "TENANT"
class_name = "TenantDO"

[[durable_objects.bindings]]
name = "SIGNUP_LIMITER"
class_name = "RateLimiterDO"

[[kv_namespaces]]
binding = "WAITLIST"
id = "e2d5939d1fdc498d85b59cfc6a3e0187"

# B4 opt-out — NOT a secret (already published in README.md/HANDOFF.md): the
# public https origin embedded in the RFC 8058 hosted one-click unsubscribe
# link (engine/tick.ts's buildListUnsubscribe). env.ts's PUBLIC_BASE_URL is
# optional with this exact same value as its code-literal fallback, so this
# entry is documentation/explicitness, not a hard requirement — update
# alongside a custom-domain cutover at activation (ACTIVATION.md).
[vars]
PUBLIC_BASE_URL = "https://agent-cold-email-api.yaakovscher.workers.dev"
# Ops email destination — founder alerts (watchtower) + the support@ inbound
# forward target. NOT a secret: already public on the legal pages
# (site/privacy.html §11, site/terms.html). A plain [vars] entry so the
# watchtower/dunning/support code has a fixed recipient; the forward target
# must also be VERIFIED in Email Routing before `message.forward` works
# (ACTIVATION.md).
OPS_ALERT_EMAIL = "yaakovscher@gmail.com"

# G1a OFAC screening (ga-gates-design-2026-07-22.md) — the public US Treasury
# SDN.CSV download. NOT a secret (no API key/auth — a public GET), so a plain
# [vars] entry like the two above, not a wrangler secret. src/ofac/
# sdn-refresh.ts falls back to this exact URL as a code-literal default if
# unset, so this line is explicitness/override-ability, not a hard requirement.
OFAC_LIST_URL = "https://www.treasury.gov/ofac/downloads/sdn.csv"

# Cloudflare Email Service (2025) outbound binding — the OpsMailer's channel
# (src/ops-mail/). NO api keys: the binding IS the credential. Ships DARK: this
# declaration is dry-run/deploy-safe on its own, but a `.send()` throws
# `E_SENDER_NOT_VERIFIED` until the owner onboards the domain
# (`wrangler email sending enable coldrig.dev`, ACTIVATION.md — needs an
# email_sending-scoped token). RealOpsMailer catches that; callers log and
# move on, so an un-onboarded domain never breaks a request or the sweep.
# Deliberately UNRESTRICTED (no `destination_address`): the dunning path emails
# arbitrary tenant contact addresses, which a single-destination restriction
# would block — so sending requires full domain onboarding, not just one
# verified destination. From-address is pinned in code to ops@coldrig.dev.
[[send_email]]
name = "OPS_EMAIL"

# SPEC.md §19.1 (M1 serving spike, dashboard+inbox brief) — `/app/*` serves the
# apps/dashboard SPA build (Vite `base: '/app/'` -> public/app/), everything
# else still hits the Worker exactly as before (same origin, no CORS change).
# `run_worker_first` scopes the Worker-first rule to "everything except
# /app/*" so the API surface is untouched; `not_found_handling =
# "single-page-application"` makes an unknown /app/* path (client-side route)
# fall back to index.html instead of a 404. No root-level static files exist
# (favicon/manifest live under /app/ once the SPA ships) since the Worker owns
# every non-/app path.
[assets]
directory = "public"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/*", "!/app/*", "!/app"]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["TenantDO"]

[[migrations]]
tag = "v2"
new_classes = ["RateLimiterDO"]

# D2 (ROADMAP.md) — the ops-sweep Cron Trigger, calling the `scheduled()`
# export in src/index.ts (src/scheduled.ts): deliverability sweep -> dunning
# sweep (+ suspend notices) -> owner digest -> WATCHTOWER health probes +
# founder-alert state machine, for every tenant.
#
# Cadence: every 5 minutes. Justification — the watchtower is the reason to arm
# the cron now, and founder-alert latency on a real outage should be minutes,
# not a day. Frequent probing is SAFE from email storms because the alert state
# machine dedupes: a persistent outage emails at most once per 6h cooldown
# regardless of probe cadence, and it emails only on state CHANGE. The
# deliverability + dunning sweeps are idempotent (dunning is deduped per
# (tenant, cycle); the loop acts only on threshold crossings), so running them
# every 5 min is safe and improves remediation latency at test-mode scale. The
# out-of-band 5-min external prober (ACTIVATION.md) covers the case where
# Cloudflare itself is down and this in-CF cron cannot fire at all.
[triggers]
crons = ["*/5 * * * *"]
