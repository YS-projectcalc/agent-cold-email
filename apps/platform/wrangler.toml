name = "agent-cold-email-api"
main = "src/index.ts"
compatibility_date = "2026-07-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "coldstart-platform-db"
database_id = "119be39d-05c3-4608-b628-b2cc7bddfac1"
migrations_dir = "migrations"

[[durable_objects.bindings]]
name = "TENANT"
class_name = "TenantDO"

[[durable_objects.bindings]]
name = "SIGNUP_LIMITER"
class_name = "RateLimiterDO"

[[kv_namespaces]]
binding = "WAITLIST"
id = "e2d5939d1fdc498d85b59cfc6a3e0187"

# B4 opt-out — NOT a secret (already published in README.md/HANDOFF.md): the
# public https origin embedded in the RFC 8058 hosted one-click unsubscribe
# link (engine/tick.ts's buildListUnsubscribe). env.ts's PUBLIC_BASE_URL is
# optional with this exact same value as its code-literal fallback, so this
# entry is documentation/explicitness, not a hard requirement — update
# alongside a custom-domain cutover at activation (ACTIVATION.md).
[vars]
PUBLIC_BASE_URL = "https://agent-cold-email-api.yaakovscher.workers.dev"

# SPEC.md §19.1 (M1 serving spike, dashboard+inbox brief) — `/app/*` serves the
# apps/dashboard SPA build (Vite `base: '/app/'` -> public/app/), everything
# else still hits the Worker exactly as before (same origin, no CORS change).
# `run_worker_first` scopes the Worker-first rule to "everything except
# /app/*" so the API surface is untouched; `not_found_handling =
# "single-page-application"` makes an unknown /app/* path (client-side route)
# fall back to index.html instead of a 404. No root-level static files exist
# (favicon/manifest live under /app/ once the SPA ships) since the Worker owns
# every non-/app path.
[assets]
directory = "public"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/*", "!/app/*", "!/app"]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["TenantDO"]

[[migrations]]
tag = "v2"
new_classes = ["RateLimiterDO"]

# D2 (ROADMAP.md) — the ops-sweep Cron Trigger, calling the `scheduled()`
# export in src/index.ts (src/scheduled.ts: deliverability sweep -> dunning
# sweep -> owner digest, for every tenant). Commented-out on purpose: ARMED
# AT ACTIVATION (ACTIVATION.md), not deployed yet. `scheduled()` itself is
# fully built and independently callable (`wrangler dev --test-scheduled`) —
# uncommenting this block is the only step activation needs for the cron lane.
# [triggers]
# crons = ["0 13 * * *"] # once/day, 13:00 UTC — the owner's daily digest cadence
