name = "agent-cold-email-api"
main = "src/index.ts"
compatibility_date = "2026-07-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "coldstart-platform-db"
database_id = "119be39d-05c3-4608-b628-b2cc7bddfac1"
migrations_dir = "migrations"

[[durable_objects.bindings]]
name = "TENANT"
class_name = "TenantDO"

[[durable_objects.bindings]]
name = "SIGNUP_LIMITER"
class_name = "RateLimiterDO"

[[kv_namespaces]]
binding = "WAITLIST"
id = "e2d5939d1fdc498d85b59cfc6a3e0187"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["TenantDO"]

[[migrations]]
tag = "v2"
new_classes = ["RateLimiterDO"]

# D2 (ROADMAP.md) — the ops-sweep Cron Trigger, calling the `scheduled()`
# export in src/index.ts (src/scheduled.ts: deliverability sweep -> dunning
# sweep -> owner digest, for every tenant). Commented-out on purpose: ARMED
# AT ACTIVATION (ACTIVATION.md), not deployed yet. `scheduled()` itself is
# fully built and independently callable (`wrangler dev --test-scheduled`) —
# uncommenting this block is the only step activation needs for the cron lane.
# [triggers]
# crons = ["0 13 * * *"] # once/day, 13:00 UTC — the owner's daily digest cadence
